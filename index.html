<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Paisagem Obrigatório</title>

<style>

body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* WRAPPER PRINCIPAL */

.wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
}

/* SIMBOLO */

.symbol{
    width:clamp(90px,18vw,180px);
    animation:pulse 2s ease-in-out infinite, glow 2s ease-in-out infinite;
}

/* LOADING */

.loading-text{
    color:white;
    font-size:clamp(16px,3vw,26px);
    letter-spacing:6px;
    margin-top:10px;
    margin-bottom:0px;
    position:relative;

    animation:
    pulse 2s infinite,
    textGlow 2s infinite;
}

/* TIMER */

.timer{
    color:white;
    font-size:clamp(18px,3.5vw,30px);
    letter-spacing:6px;
    font-weight:bold;
    margin-top:0px;
    position:relative;

    animation:
    pulse 2s infinite,
    textGlow 2s infinite;
}

/* EFEITO GLITCH */

.loading-text::after,
.timer::after{

content:attr(data-text);

position:absolute;
left:0;
top:0;

color:#ff0000;
opacity:0.3;

animation:glitchText 2s infinite;

}

/* AVISO ROTACIONAR */

#rotate-warning{
    position:fixed;
    inset:0;
    background:#000;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* TEXTO ROTACIONAR */

.rotate-text{
    font-size:22px;
    opacity:0.8;

    animation:
    pulse 2s infinite,
    textGlow 2s infinite,
    glitchText 3s infinite;
}

/* ANIMAÇÕES */

@keyframes pulse{

0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}

}

@keyframes glow{

0%{filter:drop-shadow(0 0 5px red)}
50%{filter:drop-shadow(0 0 25px red)}
100%{filter:drop-shadow(0 0 5px red)}

}

@keyframes textGlow{

0%{
text-shadow:0 0 5px white;
}

50%{
text-shadow:
0 0 10px red,
0 0 20px red,
0 0 30px red;
}

100%{
text-shadow:0 0 5px white;
}

}

@keyframes glitchText{

0%{transform:translate(0)}
20%{transform:translate(-1px,1px)}
40%{transform:translate(1px,-1px)}
60%{transform:translate(-1px,-1px)}
80%{transform:translate(1px,1px)}
100%{transform:translate(0)}

}

/* RESPONSIVO */

@media screen and (max-width:768px) and (orientation:portrait){

#rotate-warning{
display:flex;
}

.wrapper{
display:none;
}

}

</style>
</head>

<body>

<!-- AVISO DE VIRAR -->

<div id="rotate-warning">
    <div class="wrapper">
        <img src="Imgs/simbolo.svg" class="symbol">
        <div class="rotate-text">Vire o celular para continuar</div>
    </div>
</div>

<!-- TELA PRINCIPAL -->

<div class="wrapper">

<img src="Imgs/simbolo.svg" class="symbol">

<div class="loading-text" data-text="Loading...">
Loading...
</div>

<div class="timer" id="timer" data-text="00:00">
00:00
</div>

</div>

<script>

/* DATA ALVO */

const targetDate = new Date(2026,2,10,20,0,0).getTime();

/* TIMER */

function updateTimer(){

const now = new Date().getTime();

let difference = targetDate - now;

if(difference <= 0){

const timer = document.getElementById("timer");

timer.innerHTML = "00:00";
timer.setAttribute("data-text","00:00");

return;

}

const minutes = Math.floor(difference/(1000*60));

difference %= (1000*60);

const seconds = Math.floor(difference/1000);

const timeString =
String(minutes).padStart(2,'0')
+
":"
+
String(seconds).padStart(2,'0');

const timer = document.getElementById("timer");

timer.innerHTML = timeString;
timer.setAttribute("data-text",timeString);

}

setInterval(updateTimer,1000);

updateTimer();

</script>

</body>
</html>
