<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cursed</title>

<style>
body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh; /* essencial para centralização vertical no celular */
    font-family: Arial, sans-serif;
    text-align: center;
}

/* IMAGEM MENOR */
.symbol {
    width: clamp(90px, 18vw, 180px);
    animation: pulse 2s ease-in-out infinite, glow 2s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
}

/* Animação do brilho */
@keyframes glow {
    0% { filter: drop-shadow(0 0 5px rgba(255, 0, 0, 1)); }
    50% { filter: drop-shadow(0 0 25px rgba(255, 0, 0, 1)); }
    100% { filter: drop-shadow(0 0 5px rgba(255, 0, 0, 1)); }
}

/* LOADING MENOR */
.loading-text {
    margin-top: 25px;
    color: white;
    font-size: clamp(14px, 2.8vw, 24px);
    letter-spacing: 6px;
    animation: pulse 2s ease-in-out infinite;
}

/* TIMER MENOR */
.timer {
    margin-top: 18px;
    color: white;
    font-size: clamp(16px, 3.5vw, 28px);
    letter-spacing: 6px;
    font-weight: bold;
    animation: pulse 2s ease-in-out infinite;
}

/* PISCAR SUAVE */
@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

/* --- RESPONSIVIDADE PARA CELULAR --- */
@media (max-width: 600px) {
    /* Símbolo maior no celular */
    .symbol {
        width: 90%;           /* ocupa 90% da largura da tela */
        max-width: 400px;     /* limite máximo */
        height: auto;         /* mantém proporção */
    }

    /* Texto de "LOADING" maior e responsivo */
    .loading-text {
        font-size: 6vw;       /* escala com a tela */
        margin-top: 25px;
    }

    /* Timer maior e responsivo */
    .timer {
        font-size: 7vw;       /* escala com a tela */
        margin-top: 18px;
        font-weight: bold;
    }

    /* Centraliza todo o conteúdo dentro do wrapper */
    .wrapper {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;         /* ocupa altura total do body */
    }
}
</style>
</head>

<body>
  <div class="wrapper">
    <img src="Imgs/simbolo.svg" class="symbol">
    <div class="loading-text">LOADING</div>
    <div class="timer" id="timer"></div>
  </div>

<iframe
  id="ytplayer"
  src="https://www.youtube.com/embed/eCcE03qb7kc?enablejsapi=1&loop=1&playlist=eCcE03qb7kc"
  style="position:absolute; width:1px; height:1px; opacity:0; border:0;"
  allow="autoplay"
></iframe>

<script>
// Mês começa do 0 (0=Jan)
const targetDate = new Date(2026, 2, 10, 20, 0, 0).getTime();

function updateTimer() {
    const now = new Date().getTime();
    let difference = targetDate - now;

    if (difference <= 0) {
        document.getElementById("timer").innerHTML = "00:00";
        return;
    }

    const minutes = Math.floor(difference / (1000 * 60));
    difference %= (1000 * 60);

    const seconds = Math.floor(difference / 1000);

    document.getElementById("timer").innerHTML =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');
}

setInterval(updateTimer, 1000);

let tocando = false; // flag para saber se está tocando

document.addEventListener("click", function () {
  let player = document.getElementById("ytplayer");

  if (!tocando) {
    player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
    player.contentWindow.postMessage('{"event":"command","func":"setVolume","args":[20]}', '*');
    tocando = true;
  } else {
    player.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
    tocando = false;
  }
});
</script>

</body>

</html>
